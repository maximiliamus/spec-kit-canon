name: Release Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate package versions against the tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          extension_version="$(sed -n 's/^  version: "\(.*\)"/\1/p' extension/extension.yml | head -n 1)"
          preset_version="$(sed -n 's/^  version: "\(.*\)"/\1/p' preset/preset.yml | head -n 1)"

          if [[ -z "${extension_version}" || -z "${preset_version}" ]]; then
            echo "Failed to read package versions from extension/extension.yml or preset/preset.yml" >&2
            exit 1
          fi

          if [[ "${extension_version}" != "${version}" ]]; then
            echo "extension/extension.yml version ${extension_version} does not match tag ${tag}" >&2
            exit 1
          fi

          if [[ "${preset_version}" != "${version}" ]]; then
            echo "preset/preset.yml version ${preset_version} does not match tag ${tag}" >&2
            exit 1
          fi

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          (
            cd extension
            zip -r "../spec-kit-canon-${tag}.zip" .
          )

          (
            cd preset
            zip -r "../spec-kit-canon-core-${tag}.zip" .
          )

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spec-kit-canon-${{ github.ref_name }}.zip
            spec-kit-canon-core-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
