name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ github.event.inputs.tag }}"
          if [[ -z "${tag}" ]]; then
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Could not determine release tag" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate package versions against the tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release_tag.outputs.tag }}"
          version="${tag#v}"

          extension_version="$(sed -n 's/^  version: "\(.*\)"/\1/p' extension/extension.yml | head -n 1)"
          preset_version="$(sed -n 's/^  version: "\(.*\)"/\1/p' preset/preset.yml | head -n 1)"

          if [[ -z "${extension_version}" || -z "${preset_version}" ]]; then
            echo "Failed to read package versions from extension/extension.yml or preset/preset.yml" >&2
            exit 1
          fi

          if [[ "${extension_version}" != "${version}" ]]; then
            echo "extension/extension.yml version ${extension_version} does not match tag ${tag}" >&2
            exit 1
          fi

          if [[ "${preset_version}" != "${version}" ]]; then
            echo "preset/preset.yml version ${preset_version} does not match tag ${tag}" >&2
            exit 1
          fi

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release_tag.outputs.tag }}"

          (
            cd extension
            zip -r "../spec-kit-canon-${tag}.zip" .
          )

          (
            cd preset
            zip -r "../spec-kit-canon-core-${tag}.zip" .
          )

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            spec-kit-canon-${{ steps.release_tag.outputs.tag }}.zip
            spec-kit-canon-core-${{ steps.release_tag.outputs.tag }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
